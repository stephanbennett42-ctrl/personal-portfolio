<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </header>

    <section class="section bg-dark">
      <h2 class="section-title">Get In Touch</h2>
      <p class="contact-subtitle">
        I'm currently open to internship opportunities and freelance projects.
        Drop a message!
      </p>

      <div class="contact-wrapper">
      <form action="https://formspree.io/f/xgobllkg" method="POST" class="contact-form">
     
    <div class="form-group">
        <label for="name">Name</label>
        <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
            required
        />
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="name@example.com"
            required
        />
    </div>

    <div class="form-group">
        <label for="message">Message</label>
        <textarea
            id="message"
            name="message"
            rows="6"
            placeholder="Type your message here..."
            required
        ></textarea>
    </div>

    <button type="submit" class="btn primary-btn submit-btn">
        <i class="fas fa-paper-plane"></i> Send Message
    </button>
    
</form>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 Portfolio. Built from scratch.</p>
    </footer>
  </body>
</html>
