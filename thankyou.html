<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Stephan Bennett</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">

    <main class="content-container" style="padding-top: 0 !important;">
        <section class="section bg-dark" style="border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 4rem 2rem;">
            <i class="fas fa-check-circle" style="font-size: 4rem; color: var(--primary-color); margin-bottom: 1.5rem; filter: drop-shadow(0 0 10px var(--primary-color));"></i>
            <h2 class="section-title" style="margin-bottom: 1rem;">Message Sent!</h2>
            <p style="margin-bottom: 2.5rem; color: var(--text-color);">Thank you for reaching out. Your message has been routed successfully, and I will get back to you as soon as possible.</p>
            
            <a href="index.html" class="btn primary-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </section>
    </main>

</body>
</html>
